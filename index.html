<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>InTouch123 — Hypothesis Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div id="hdr">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
      <rect x="4" y="4" width="40" height="40" rx="8" fill="#fff"/>
      <path d="M22 14L28 11V37H22V18L18 20V14H22Z" fill="#0D0D0D"/>
    </svg>
    <span class="logo-name">InTouch123</span>
    <span class="logo-sub">Hypothesis Tree · v0.4</span>
  </div>
  <div class="nav-buttons">
    <button class="nav-btn" onclick="openMoms()">Moms</button>
    <button class="nav-btn" onclick="openMockups()">Mockups</button>
    <button class="nav-btn nav-btn-review" onclick="openReview()">Review</button>
    <button class="nav-btn nav-btn-changelog" id="cl-toggle-btn" onclick="toggleChangelogBar()">Changelog</button>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-sw" style="background:#0F1710;border:1px solid #2A2A2A;border-top:2px solid #D4A574"></div><span style="color:#7FBF95">Validated</span> <span class="leg-color">green</span></div>
    <div class="leg"><div class="leg-sw" style="background:#0E1418;border:1px solid #28607A"></div><span style="color:#6AB0D2">Review</span> <span class="leg-color">blue</span></div>
    <div class="leg"><div class="leg-sw" style="background:#111;border:1px solid #252525"></div><span style="color:#BBBBBB">Active</span> <span class="leg-color">white</span></div>
    <div class="leg"><div class="leg-sw" style="background:#100E0A;border:1.5px dashed #7A5828"></div><span style="color:#A07840">Pending</span> <span class="leg-color">gold</span></div>
    <div class="leg"><div class="leg-sw" style="background:#0E0E0E;border:1.5px dashed #222;opacity:.5"></div><span style="color:#666">Eliminated</span> <span class="leg-color">red</span></div>
    <div class="leg" style="margin-left:4px"><div class="leg-sw" style="background:rgba(224,160,80,.15);border:1px solid rgba(224,160,80,.30);font-size:6px;display:flex;align-items:center;justify-content:center;color:#E0A050;font-weight:700">&amp;</div><span style="color:#E0A050">AND</span></div>
    <div class="leg"><div class="leg-sw" style="background:rgba(80,176,224,.15);border:1px solid rgba(80,176,224,.30);font-size:6px;display:flex;align-items:center;justify-content:center;color:#50B0E0;font-weight:700">|</div><span style="color:#50B0E0">OR</span></div>
    <div class="leg"><div class="leg-sw" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)"></div><span style="color:#999">FINAL</span></div>
    <div class="leg depth-ctrl-header" style="margin-left:8px">
      <span class="depth-label">Depth</span>
      <button class="depth-hdr-btn" onclick="setMaxDepth(MAX_DEPTH-1)">&minus;</button>
      <span id="depth-val">5</span>
      <button class="depth-hdr-btn" onclick="setMaxDepth(MAX_DEPTH+1)">+</button>
    </div>
  </div>
</div>

<div id="changelog-bar" class="collapsed">
  <button class="cl-nav-btn cl-nav-label" id="cl-older" onclick="clNav(1)" title="Older change">&lsaquo; older</button>
  <span class="cl-info" id="cl-info">Loading changelog...</span>
  <button class="cl-nav-btn cl-nav-label" id="cl-newer" onclick="clNav(-1)" title="Newer change">newer &rsaquo;</button>
  <span class="cl-sep"></span>
  <span class="cl-node-count" id="cl-node-count"></span>
  <label class="cl-toggle">
    <input type="checkbox" id="cl-filter-new" onchange="toggleChangelogFilter()">
    <span>New</span>
  </label>
  <label class="cl-toggle">
    <input type="checkbox" id="cl-filter-modified" onchange="toggleChangelogFilter()">
    <span>Modified</span>
  </label>
</div>

<div id="canvas"><svg id="tree"><g id="G"></g></svg></div>

<div id="ctrl">
  <button class="cb" id="zi">+</button>
  <button class="cb" id="zo">&minus;</button>
  <button class="cb" id="zr" style="font-size:13px">&#8962;</button>
</div>

<div id="editor-toggle">
  <button class="cb" id="dl-btn" onclick="downloadJSON()" title="Download JSON" style="font-size:13px;width:auto;padding:0 10px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <button class="cb" id="et" title="Toggle JSON editor" style="font-size:13px;width:auto;padding:0 10px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>
  </button>
</div>

<div id="editor-panel">
  <div class="ep-header">
    <h3>tree.json</h3>
    <div class="ep-actions">
      <button class="ep-btn" id="ep-dl" title="Download JSON">&#8681; Save</button>
      <button class="ep-btn" id="ep-fmt">Format</button>
      <button class="ep-btn primary" id="ep-apply">Apply</button>
      <button class="ep-btn" id="ep-close">&times;</button>
    </div>
  </div>
  <div class="ep-error" id="ep-error"></div>
  <textarea id="ep-textarea" spellcheck="false"></textarea>
</div>

<div id="hint">scroll/pinch to zoom · drag to pan · click node to expand</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// Prevent iPad/iOS page-level pinch-to-zoom globally
// touchstart with multi-touch is key — iOS initiates zoom here, not just touchmove
document.addEventListener('touchstart', e => {
  if(e.touches.length > 1) e.preventDefault();
}, {passive: false});
document.addEventListener('touchmove', e => {
  if(e.touches.length > 1) e.preventDefault();
}, {passive: false});
// Safari-specific gesture events (all three phases)
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
</script>
<script src="src/renderer.js"></script>
</body>
</html>
