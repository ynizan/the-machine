<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>InTouch123 — Hypothesis Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div id="hdr">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
      <rect x="4" y="4" width="40" height="40" rx="8" fill="#fff"/>
      <path d="M22 14L28 11V37H22V18L18 20V14H22Z" fill="#0D0D0D"/>
    </svg>
    <span class="logo-name">InTouch123</span>
    <span class="logo-sub">Hypothesis Tree · v0.4</span>
  </div>
  <div class="nav-buttons">
    <button class="nav-btn" onclick="openMoms()">Moms</button>
    <button class="nav-btn" onclick="openMockups()">Mockups</button>
    <button class="nav-btn nav-btn-review" onclick="openReview()">Review</button>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-sw" style="background:#0F1710;border:1px solid #2A2A2A;border-top:2px solid #D4A574"></div>Validated</div>
    <div class="leg"><div class="leg-sw" style="background:#111;border:1px solid #252525"></div>Active</div>
    <div class="leg"><div class="leg-sw" style="background:#100E0A;border:1.5px dashed #7A5828"></div>Pending</div>
    <div class="leg"><div class="leg-sw" style="background:#0E0E0E;border:1.5px dashed #222;opacity:.5"></div>Eliminated</div>
    <div class="leg" style="margin-left:4px">
      <div style="width:24px;height:1.5px;background:#333;border-radius:2px"></div>Edge = Test
    </div>
  </div>
</div>

<div id="canvas"><svg id="tree"><g id="G"></g></svg></div>

<div id="ctrl">
  <button class="cb" id="zi">+</button>
  <button class="cb" id="zo">&minus;</button>
  <button class="cb" id="zr" style="font-size:13px">&#8962;</button>
</div>

<div id="editor-toggle">
  <button class="cb" id="dl-btn" onclick="downloadJSON()" title="Download JSON" style="font-size:13px;width:auto;padding:0 10px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <button class="cb" id="et" title="Toggle JSON editor" style="font-size:13px;width:auto;padding:0 10px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>
  </button>
</div>

<div id="editor-panel">
  <div class="ep-header">
    <h3>tree.json</h3>
    <div class="ep-actions">
      <button class="ep-btn" id="ep-dl" title="Download JSON">&#8681; Save</button>
      <button class="ep-btn" id="ep-fmt">Format</button>
      <button class="ep-btn primary" id="ep-apply">Apply</button>
      <button class="ep-btn" id="ep-close">&times;</button>
    </div>
  </div>
  <div class="ep-error" id="ep-error"></div>
  <textarea id="ep-textarea" spellcheck="false"></textarea>
</div>

<div id="hint">scroll/pinch to zoom · drag to pan · click node to expand</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// Prevent iPad/iOS page-level pinch-to-zoom globally
// touchstart with multi-touch is key — iOS initiates zoom here, not just touchmove
document.addEventListener('touchstart', e => {
  if(e.touches.length > 1) e.preventDefault();
}, {passive: false});
document.addEventListener('touchmove', e => {
  if(e.touches.length > 1) e.preventDefault();
}, {passive: false});
// Safari-specific gesture events (all three phases)
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());
</script>
<script src="src/renderer.js"></script>
</body>
</html>
